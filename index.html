<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default SEO (overridden per page by useSEO hook) -->
    <title>123Kids — Kids Camps, Classes, Events &amp; Birthday Spots in Palm Beach County</title>
    <meta name="description" content="Find the best kids camps, classes, events and birthday spots in Palm Beach County, Florida. Trusted by local families. Book online." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="123Kids" />
    <meta name="keywords" content="kids camps Palm Beach County, children classes West Palm Beach, kids birthday parties Palm Beach, kids activities Florida, summer camps Palm Beach" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.123kids.com/" />
    <meta property="og:title" content="123Kids — Kids Activities in Palm Beach County" />
    <meta property="og:description" content="Find the best kids camps, classes, events and birthday spots in Palm Beach County, Florida." />
    <meta property="og:image" content="https://www.123kids.com/og-default.jpg" />
    <meta property="og:site_name" content="123Kids" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="123Kids — Kids Activities in Palm Beach County" />
    <meta name="twitter:description" content="Find the best kids camps, classes, events and birthday spots in Palm Beach County, Florida." />
    <meta name="twitter:image" content="https://www.123kids.com/og-default.jpg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.123kids.com/" />

    <!-- JSON-LD Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "123Kids",
      "url": "https://www.123kids.com",
      "logo": "https://www.123kids.com/favicon.ico",
      "description": "Find the best kids camps, classes, events and birthday spots in Palm Beach County, Florida.",
      "areaServed": {
        "@type": "AdministrativeArea",
        "name": "Palm Beach County, Florida"
      },
      "sameAs": ["https://www.123kids.com"]
    }
    </script>

    <!-- JSON-LD WebSite Schema with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "123Kids",
      "url": "https://www.123kids.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.123kids.com/listings?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
